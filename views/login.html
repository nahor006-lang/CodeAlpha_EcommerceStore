<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login - MA SPACE</title>
        <link rel="stylesheet" href="/css/style.css">
    </head>

    <body>
        <%- include('../partials/header.html') %>

        <main class="auth-page section-p1">
            <div class="auth-box">
                <h1>Welcome back</h1>
                <p class="auth-subtitle">Log in to view your orders and check out faster.</p>

                <% if (error) { %><p class="form-error"><%= error %></p><% } %>

                <form action="/login" method="POST" class="auth-form">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>

                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>

                    <button type="submit" class="checkout-btn">Log In</button>
                </form>

                <p class="auth-switch">Don't have an account? <a href="/register">Create one</a></p>
            </div>
        </main>

        <footer class="site-footer">
            <%- include('../partials/footer.html') %>
        </footer>

        <script src="/js/script.js"></script>
    </body>
</html>
