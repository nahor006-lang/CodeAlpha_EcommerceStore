<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Journal - MA SPACE</title>
        <link rel="stylesheet" href="/css/style.css">
    </head>

    <body>
        <%- include('../partials/header.html') %>

        <main class="content-page section-p1">
            <div class="content-page-inner">
                <span class="banner-subtitle">The Journal</span>
                <h1 class="page-title">Notes on quiet living.</h1>
                <p>Thoughts on design, materials, and making a home feel like your own.</p>
            </div>

            <div class="blog-grid">
                <% posts.forEach(function(post) { %>
                    <div class="blog-card">
                        <div class="image-container">
                            <img src="<%= post.image %>" alt="<%= post.title %>">
                        </div>
                        <div class="blog-card-body">
                            <h3><%= post.title %></h3>
                            <p><%= post.excerpt %></p>
                        </div>
                    </div>
                <% }); %>
            </div>
        </main>

        <footer class="site-footer">
            <%- include('../partials/footer.html') %>
        </footer>

        <script src="/js/script.js"></script>
    </body>
</html>
